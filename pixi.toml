[project]
name = "dl_project"
version = "0.1.0"
authors = ["imsf04 <22103067D@connect.polyu.hk>"]
channels = ["conda-forge"]
platforms = ["win-64"]

[system-requirements]
cuda = "12.8"

[dependencies]
python = ">=3.12,<3.13"
pandas = ">=2.0,<3.0"
numpy = ">=1.26,<2.0"
matplotlib = ">=3.8,<4.0"
seaborn = ">=0.13,<0.14"
scikit-learn = ">=1.5,<2.0"
xgboost = ">=2.0,<3.0"
prettytable = ">=3.0,<4.0"
joblib = ">=1.3,<2.0"
jupyter = ">=1.0,<2.0"
gradio = ">=5.49.0,<6"

[pypi-dependencies]
torch = { version = ">=2.5,<3.0", index = "https://download.pytorch.org/whl/cu128" }
torchvision = { version = ">=0.20,<1.0", index = "https://download.pytorch.org/whl/cu128" }
torchaudio = { version = ">=2.5,<3.0", index = "https://download.pytorch.org/whl/cu128" }

[tasks]
test-pytorch = "python -c 'import torch; print(\"PyTorch:\", torch.__version__); print(\"CUDA:\", torch.cuda.is_available()); print(\"CUDA Version:\", torch.version.cuda)'"
jupyter = "jupyter notebook"
jupyter-lab = "jupyter lab"
profile = "python htru_profile.py"
